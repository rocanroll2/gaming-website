<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Zone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#1f1f1f;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    color:#00ff99;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.hero{
    text-align:center;
    padding:80px 20px;
    background:linear-gradient(45deg,#00ff99,#0066ff);
}

.hero h2{
    font-size:50px;
}

.hero p{
    margin:20px 0;
    font-size:20px;
}

.btn{
    display:inline-block;
    padding:12px 30px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:30px;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#222;
    border-radius:10px;
    padding:20px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin:15px 0;
}

.card button{
    padding:10px 20px;
    background:#00ff99;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

footer{
    text-align:center;
    padding:20px;
    background:#1f1f1f;
}
</style>

</head>
<body>

<header>
<h1>🎮 Gaming Zone</h1>
<nav>
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h2>Welcome to Gaming Zone</h2>
<p>Play exciting games and enjoy the fun!</p>
<a href="#" class="btn">Start Playing</a>
</section>

<section class="games">

<div class="card">
<img src="https://picsum.photos/300/200?1" alt="Game">
<h3>Racing Game</h3>
<button onclick="playGame('Racing Game')">Play</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2" alt="Game">
<h3>Adventure Game</h3>
<button onclick="playGame('Adventure Game')">Play</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3" alt="Game">
<h3>Shooter Game</h3>
<button onclick="playGame('Shooter Game')">Play</button>
</div>

</section>

<footer>
© 2026 Gaming Zone | Made with ❤️
</footer>

<script>
function playGame(game){
    alert("Launching " + game + "...");
}
</script>

</body>
</html>
